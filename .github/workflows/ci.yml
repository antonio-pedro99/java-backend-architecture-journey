name: Java Backend Architecture Journey CI

on:
  push:
    branches: master
  pull_request:
    branches: master

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        java: [ '17', '21' ]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK ${{ matrix.java }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ matrix.java }}
        distribution: 'temurin'
        cache: maven
    
    - name: Build with Maven
      run: mvn -B clean install --file pom.xml
    
    - name: Run tests
      run: mvn -B test --file pom.xml
    
    - name: Generate coverage report
      run: mvn -B jacoco:report --file pom.xml
      if: matrix.java == '17'
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      if: matrix.java == '17'
      with:
        files: ./target/site/jacoco/jacoco.xml
        flags: unittests
        name: codecov-umbrella
    
    - name: Run Checkstyle
      run: mvn -B checkstyle:check --file 03-clean-architecture/pom.xml
      continue-on-error: true
    
    - name: Cache Maven packages
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

  code-quality:
    name: Code Quality Analysis
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Shallow clones should be disabled for better analysis
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    
    - name: Compile code
      run: mvn -B compile --file pom.xml
    
    - name: Run SpotBugs
      run: mvn -B spotbugs:check --file 03-clean-architecture/pom.xml
      continue-on-error: true

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build Docker images
      run: |
        echo "Docker image building would happen here"
        # docker build -t java-journey/netty-networking:latest ./01-netty-networking
        # docker build -t java-journey/spring-framework:latest ./02-spring-framework

  dependency-check:
    name: Security Dependency Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    
    - name: OWASP Dependency Check
      run: |
        echo "Dependency vulnerability scanning would happen here"
