name: Java Backend Architecture Journey CI

on:
  push:
    branches: master
  pull_request:
    branches: master

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        java: [ '17', '21' ]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK ${{ matrix.java }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ matrix.java }}
        distribution: 'temurin'
        cache: maven
    
    - name: Build with Maven
      run: mvn -B clean install --file pom.xml
    
    - name: Run tests
      run: mvn -B test --file pom.xml


  code-quality:
    name: Code Quality Analysis
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Shallow clones should be disabled for better analysis
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    
    - name: Compile code
      run: mvn -B compile --file pom.xml
    
    - name: Run SpotBugs
      run: mvn -B spotbugs:check --file 03-clean-architecture/pom.xml
      continue-on-error: true

  dependency-check:
    name: Security Dependency Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    
    - name: OWASP Dependency Check
      run: |
        echo "Dependency vulnerability scanning would happen here"
        # mvn org.owasp:dependency-check-maven:check
      continue-on-error: true
